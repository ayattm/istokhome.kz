<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ISTOK HOME</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Montserrat', sans-serif;
font-weight:300;
background:#111;
color:white;
text-align:center;
}

.grid{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size:80px 80px;
z-index:-1;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.logo img{
width:200px;
max-width:80%;
}

.subtitle h1{
margin:20px 0 5px 0;
font-weight:200;
letter-spacing:4px;
}

.subtitle h4{
margin:0;
opacity:0.6;
font-weight:300;
}

.contacts{
margin-top:40px;
font-size:14px;
opacity:0.7;
line-height:1.8;
}

.social{
margin-top:25px;
}

.social a{
color:white;
font-size:20px;
margin:0 12px;
opacity:0.6;
transition:0.3s;
}

.social a:hover{
opacity:1;
transform:translateY(-2px);
}

.button{
margin-top:40px;
padding:14px 30px;
border:1px solid white;
background:transparent;
color:white;
cursor:pointer;
font-size:13px;
letter-spacing:3px;
font-weight:300;
transition:0.3s;
}

.button:hover{
background:white;
color:black;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1a1a1a;
padding:40px;
width:90%;
max-width:420px;
text-align:left;
}

.modal-content h3{
margin-top:0;
font-weight:300;
letter-spacing:2px;
}

.modal-content input,
.modal-content textarea{
width:100%;
margin-top:12px;
padding:12px;
background:#111;
border:1px solid rgba(255,255,255,0.2);
color:white;
font-family:'Montserrat', sans-serif;
}

.modal-content button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:white;
color:black;
cursor:pointer;
font-family:'Montserrat', sans-serif;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:28px;
cursor:pointer;
}

footer{
margin-top:80px;
padding:40px 0;
font-size:12px;
opacity:0.4;
letter-spacing:2px;
}

</style>

</head>

<body>

<div class="grid"></div>

<section class="hero">

<div class="logo">
<img src="/assets/img/logo.svg" alt="ISTOK HOME">
</div>

<div class="subtitle">
<h1>ISTOK HOME</h1>
<h4>Дизайн интерьера с реализацией под ключ</h4>
</div>

<div class="contacts">
<p>info@istokhome.kz</p>
<p>+7 777 139 9977</p>
<p>Астана, Казахстан</p>
</div>

<div class="social">
<a href="https://instagram.com/istokhome"><i class="fa-brands fa-instagram"></i></a>
<a href="https://t.me/istokhome"><i class="fa-brands fa-telegram"></i></a>
<a href="https://wa.me/+77771399977"><i class="fa-brands fa-whatsapp"></i></a>
</div>

<button class="button" onclick="openModal()">
ОБСУДИТЬ ПРОЕКТ
</button>

</section>

<div class="modal" id="contactModal">

<div class="close" onclick="closeModal()">×</div>

<div class="modal-content">

<h3>ОБСУДИТЬ ПРОЕКТ</h3>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<input type="hidden" name="_subject" value="Новая заявка с istokhome.kz">

<input type="hidden" name="_next" value="https://istokhome.kz/thank-you.html">

<input type="text" name="name" placeholder="Ваше имя" required>

<input type="tel" name="phone" placeholder="Телефон" required>

<textarea name="message" rows="4" placeholder="Кратко о проекте"></textarea>

<button type="submit">Отправить</button>

</form>

</div>

</div>

<footer>
© ISTOK HOME 2019–2026
</footer>

<script>

function openModal(){
document.getElementById("contactModal").style.display="flex";
}

function closeModal(){
document.getElementById("contactModal").style.display="none";
}

</script>

</body>
</html>
