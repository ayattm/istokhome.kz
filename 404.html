<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>404 — ISTOK HOME</title>
<meta name="robots" content="noindex">

<style>

body{
margin:0;
font-family: Montserrat, sans-serif;
background:#111;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.container{
text-align:center;
position:relative;
}

h1{
font-size:140px;
font-weight:200;
letter-spacing:10px;
margin:0;
}

p{
margin-top:10px;
opacity:0.7;
font-size:18px;
}

a{
display:inline-block;
margin-top:40px;
padding:14px 30px;
border:1px solid white;
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:2px;
transition:0.3s;
}

a:hover{
background:white;
color:black;
}

.grid{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
background-size:80px 80px;
z-index:-1;
}

.line{
position:absolute;
height:1px;
background:rgba(255,255,255,0.15);
width:0;
top:50%;
left:0;
animation:draw 3s forwards;
}

@keyframes draw{
to{
width:100%;
}
}

.cta-button {
  display: inline-block;
  padding: 14px 32px;
  background: #333;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
  transition: 0.3s;
}

.cta-button:hover {
  background: #000;
}

</style>

</head>

<body>

<div class="grid"></div>
<div class="line"></div>

<div class="container">

<section class="error-page">
  <h1>404</h1>
  <p>Страница не найдена</p>

  <a href="/" class="cta-button">Вернуться на главную</a>
</section>

</div>

</body>
</html>
