<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>404</title>

<style>

body{
margin:0;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background:#0f0f10;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

h1{
font-size:120px;
margin:0;
letter-spacing:5px;
animation: float 3s ease-in-out infinite;
}

p{
opacity:0.7;
margin-top:10px;
}

a{
margin-top:30px;
padding:12px 24px;
border:1px solid #fff;
color:white;
text-decoration:none;
transition:0.3s;
}

a:hover{
background:white;
color:black;
}

@keyframes float{
0%{
transform: translateY(0px);
}
50%{
transform: translateY(-20px);
}
100%{
transform: translateY(0px);
}
}

.circle{
position:absolute;
width:400px;
height:400px;
background: radial-gradient(circle, #444, transparent);
filter: blur(80px);
animation: move 12s infinite alternate;
}

@keyframes move{
0%{
transform: translate(-200px,-200px);
}
100%{
transform: translate(200px,200px);
}
}

</style>
</head>

<body>

<div class="circle"></div>

<h1>404</h1>

<p>Страница не найдена</p>

<a href="/">Вернуться на главную</a>

</body>
</html>
